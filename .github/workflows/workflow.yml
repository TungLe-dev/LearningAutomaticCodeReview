name: Automated Code Review via Pull Request
on:
  pull_request:
    branches:
      - main

jobs:
  build-and-review:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write # Cần quyền này để action có thể comment vào PR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        run: mvn -B clean test

      - name: Run Checkstyle
        run: mvn -B checkstyle:check

      - name: Inline Checkstyle Feedback
        if: always()
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning